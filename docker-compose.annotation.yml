# Docker Compose — PEA Annotation Stack
# ======================================
# Runs Label Studio alongside the pipeline for the active learning loop.
#
# Usage:
#   docker compose -f docker-compose.annotation.yml up -d
#   open http://localhost:8080
#
# First run:
#   1. Create an account at http://localhost:8080
#   2. Create a new project: "PEA Protest Event Annotation"
#   3. Settings → Labeling Interface → Code
#      Paste the contents of src/annotation/labeling_config.xml
#   4. Import tasks:
#      Projects → Import → upload data/annotation/tasks_YYYYMMDD.json
#      (generated by: python -m src.annotation.export_for_annotation)
#   5. Annotate.
#   6. Export: Projects → Export → JSON → save to data/annotation/
#   7. python -m src.annotation.import_annotations \
#        --annotations data/annotation/label_studio_export.json
#
# Volumes:
#   label_studio_data  — Label Studio DB, projects, user accounts (persisted)
#   ./data/annotation  — shared with host so export/import scripts can read/write directly
#
# Environment variables:
#   LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
#     Allows Label Studio to serve files from the local annotation volume.
#   LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
#     Root for local file serving — maps to ./data/annotation on the host.

services:
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: pea-label-studio
    ports:
      - "8080:8080"
    volumes:
      - label_studio_data:/label-studio/data
      - ./data/annotation:/label-studio/files
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
      # Disable telemetry
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=false
      - COLLECT_ANALYTICS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  label_studio_data:
    driver: local
