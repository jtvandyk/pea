# ============================================================================
# CHANGE 1 — confrontation vs riot: add operational threshold
# LOCATION: event_types.riot.decision_rules  (append new rule)
#            event_types.confrontation.decision_rules  (append new rule)
# ============================================================================
#
# PROBLEM: "protester-initiated violence" is the current rule but it has no
# operational threshold. Stone-throwing during a march is ambiguous.
#
# ── EFFECTIVE (what to add) ──────────────────────────────────────────────────
#
# Add to riot.decision_rules:
#   - "IF stone-throwing, tyre-burning, or deliberate property destruction is
#     the PRIMARY reported action (not a brief or incidental incident) AND at
#     least ONE of the following is also reported: arrests, injuries, security
#     force deployment → RIOT. 'Primary' means the article's headline or lead
#     paragraph characterises the event through the violence, not the march."
#   - "IF the same event begins as a march and transitions to property damage
#     mid-event → RIOT (escalation takes priority; use the date of the march
#     for event_date, note transition in outcome_notes)."
#
# Add to confrontation.decision_rules:
#   - "IF protesters block a road or building using burning tyres or debris BUT
#     no persons are attacked and no looting is reported → CONFRONTATION, not
#     RIOT. Burning objects as a blockade tactic is confrontation; burning
#     objects as an expression of rage against persons or property is riot."
#
# ── INEFFECTIVE (do NOT write like this) ─────────────────────────────────────
#
# INEFFECTIVE: "If there is more violence it is a riot."
#   Why bad: 'more violence' is circular. The rule must specify what observable
#   text feature (headline framing, specific act reported, secondary indicators
#   like arrests) operationalises the distinction.
#
# INEFFECTIVE: "Riots involve property destruction; confrontations do not."
#   Why bad: burning tyres IS property destruction and is common in ZA/NG
#   confrontations. This rule would misclassify hundreds of service-delivery
#   protests. The distinguishing feature is target (access-blocking vs.
#   damage/looting) and primary framing, not the presence of destruction.
#
# ── SOURCE TO VERIFY ─────────────────────────────────────────────────────────
# TODO: Cross-check against ACLED Codebook v17 "Riots" vs "Protests" definition.
# ACLED distinguishes: Riots = "violent events where demonstrators or mobs engage
# in disruptive acts, including but not limited to rock throwing, property
# destruction and violent confrontations with other groups."
# Confirm whether ACLED requires a secondary indicator (arrests/injuries) or
# whether property destruction alone is sufficient. Update rule accordingly.


# ============================================================================
# CHANGE 2 — occupation_seizure: fix the ≥2 hour duration gate
# LOCATION: event_types.occupation_seizure.decision_rules  (replace one rule)
# ============================================================================
#
# PROBLEM: Current rule "≥2 hours" has no academic citation. ACLED does not
# use a temporal threshold for occupation events.
#
# ── CURRENT RULE (to replace) ────────────────────────────────────────────────
#   - "IF protesters physically control a space for ≥2 hours with stated intent
#     to remain → OCCUPATION_SEIZURE"
#
# ── EFFECTIVE REPLACEMENT ────────────────────────────────────────────────────
#   - "IF protesters physically control a space (building, entrance, public
#     square) with stated or implied intent to remain until demands are met →
#     OCCUPATION_SEIZURE, regardless of actual duration. Duration is evidence
#     of intent, not a gate. A sit-in dispersed by police after 20 minutes still
#     qualifies if the participants declared they would stay."
#   - "IF the article reports only that protesters 'gathered outside' or 'blocked
#     the entrance briefly' without any indication of intent to remain →
#     CONFRONTATION, not OCCUPATION_SEIZURE."
#
# ── INEFFECTIVE (do NOT write like this) ─────────────────────────────────────
#
# INEFFECTIVE: "Remove the time requirement entirely — any sit-in counts."
#   Why bad: Without any threshold, a 5-minute flash sit-in staged for a photo
#   op and immediately abandoned would qualify. Intent-to-remain is a more
#   defensible gate than duration AND aligns with how ACLED and SCAD code it.
#
# ── SOURCE TO VERIFY ─────────────────────────────────────────────────────────
# TODO: Check ACLED v17 definition of "Siege" and SCAD v2.3 "occupation" code.
# MPEDS uses "occupation" without a temporal gate — confirm and cite.
# If literature supports intent-to-remain over duration, remove the 2-hour
# reference entirely from the codebook and note the source.


# ============================================================================
# CHANGE 3 — petition_signature: online vs. physical split
# LOCATION: event_types.petition_signature.decision_rules  (append 2 new rules)
#            event_types.petition_signature.confidence_threshold  (may lower)
# ============================================================================
#
# PROBLEM: Online-only petitions lack physical assembly (minimum criterion 2).
# Currently no rule distinguishes them. Hybrid events (march + petition delivery)
# need a clear coding instruction.
#
# ── EFFECTIVE (what to add) ──────────────────────────────────────────────────
#   - "IF petition was collected online only (no physical gathering or delivery
#     ceremony) → PETITION_SIGNATURE, confidence maximum MEDIUM. Online petitions
#     are borderline on minimum criterion 2 (public setting). Include only if
#     there is clear evidence of political targeting (named recipient, formal
#     submission to a government body)."
#   - "IF a physical march or rally accompanied the petition delivery → extract
#     as PETITION_SIGNATURE (the delivery is the culminating tactic). The march
#     is part of the same event, not a separate DEMONSTRATION_MARCH. Exception:
#     if the march is itself large and politically significant (>500 people,
#     major city) and the petition delivery is incidental → DEMONSTRATION_MARCH,
#     note petition in claims."
#   - "IF detainees submit a written letter of demands as part of a hunger strike
#     → do NOT extract as a separate PETITION_SIGNATURE. Written demands are a
#     normal incident of a hunger strike, not a distinct event."
#
# ── INEFFECTIVE (do NOT write like this) ─────────────────────────────────────
#
# INEFFECTIVE: "Online petitions count if they have many signatures."
#   Why bad: signature count is not an operationalisable criterion in article
#   text. Articles rarely give exact signature counts. 'Many' is undefined.
#   The actual distinguishing criterion is physical delivery to an institution.
#
# INEFFECTIVE: "If there is also a march, code as demonstration_march."
#   Why bad: This is the opposite of what we want. The march is in support of
#   the petition; the petition delivery is the event's culminating act. Losing
#   petition_signature from the coding means losing the tactic information that
#   makes petition_signature distinct from demonstration_march.


# ============================================================================
# CHANGE 4 — hunger_strike: prison setting and announcement requirement
# LOCATION: event_types.hunger_strike.decision_rules  (append 3 new rules)
#            event_types.hunger_strike.positive_examples  (add Africa examples)
# ============================================================================
#
# ── EFFECTIVE (what to add to decision_rules) ────────────────────────────────
#   - "Prison hunger strikes ARE included when ALL THREE of these hold:
#     (a) demands are political (not personal, e.g. not 'better food'),
#     (b) the hunger strike is publicly announced (via lawyer, family statement,
#     or press release — not just rumour), and
#     (c) ≥2 people, OR 1 person of clear public significance (named activist,
#     elected official, known opposition figure)."
#   - "Private food refusal by a detainee with no public announcement and no
#     political demand → NOT included. The action must be knowingly public."
#   - "IF a hunger strike is collective AND public AND political but the article
#     is primarily about the government's response (prison conditions report,
#     parliamentary question) → STILL extract the hunger_strike event. Apply
#     confidence downgrade for protest-adjacent reporting."
#
# ── EFFECTIVE (what to add to positive_examples) ─────────────────────────────
#   - "Twelve opposition detainees at Luzira Prison announced a hunger strike via
#     their lawyers, demanding release on bail (Uganda)"
#   - "Imprisoned civil society leaders refused food for ten days to protest
#     their detention under anti-terrorism laws (Ethiopia)"
#   - "Former presidential candidate on hunger strike at military hospital
#     demanding access to legal counsel (Algeria)"
#
# ── INEFFECTIVE (do NOT write like this) ─────────────────────────────────────
#
# INEFFECTIVE: "Hunger strikes in prison count if the person is political."
#   Why bad: 'Political person' is not defined. A municipal councillor who stops
#   eating because of a personal dispute could be called political. The rules
#   must operationalise DEMAND (political target), ANNOUNCEMENT (public act),
#   and ACTOR (≥2 or significant individual).
#
# ── SOURCE TO VERIFY ─────────────────────────────────────────────────────────
# TODO: Check NAVCO 2.1 coding of hunger strikes as nonviolent tactics.
# MPEDS does not distinguish hunger strike as a separate type — confirm our
# decision to keep it separate from demonstration_march is justified by the
# distinctive tactic (self-harm as leverage, not assembly).


# ============================================================================
# CHANGE 5 — protest-adjacent reporting: add confidence downgrade rule
# LOCATION: confidence_guidance  (add new modifier, after civic_space_downgrade)
# ============================================================================
#
# PROBLEM: Articles primarily about a government response, court ruling, or
# police statement ABOUT a past protest are currently coded at face value,
# producing spuriously high confidence scores.
#
# ── EFFECTIVE (what to add) ──────────────────────────────────────────────────
#
# Add new modifier `protest_adjacent_downgrade` under confidence_guidance:
#
#   protest_adjacent_downgrade:
#     trigger: |
#       The article is primarily about a government announcement, court ruling,
#       parliamentary debate, police statement, or NGO report ABOUT a protest
#       event, rather than a contemporaneous news report OF the protest.
#     effect: "Downgrade confidence one level (high → medium; medium → low)"
#     examples:
#       trigger_yes:
#         - "Government bans protest march planned for Saturday (article published Friday)"
#         - "Police report 47 arrests from last week's demonstration"
#         - "Human rights commission publishes findings on 2023 crackdown"
#         - "Opposition leader condemns teargas use at yesterday's rally"
#       trigger_no:
#         - "Protesters marched through Kampala on Tuesday demanding [...]"
#         - "Hundreds arrested as police dispersed crowds outside parliament"
#         - "Strike continues for third day; union rejects government offer"
#     note: |
#       Apply to the event being described, not to the article as a whole. If an
#       article contains both a contemporaneous report of Event A and a government
#       statement about Event B, downgrade only Event B.
#
# ── INEFFECTIVE (do NOT write like this) ─────────────────────────────────────
#
# INEFFECTIVE: "If the article is not directly about the protest, lower confidence."
#   Why bad: 'Directly about' is ambiguous. A police arrest report is directly
#   about an arrest that resulted from a protest — does it count? The rule must
#   specify the article's PRIMARY SUBJECT and give positive examples of what
#   triggers the downgrade.


