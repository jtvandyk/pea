# CHANGE 6 — Algeria/Hirak: add country-specific rules
# LOCATION: african_context  (add new subsection `algeria_hirak`)
# ============================================================================
#
# PROBLEM: Hirak (2019–2021 Algerian protest movement) generates a large share
# of DZ articles. Its specific features (anonymous organisers, weekly recurrence,
# Friday timing, pre-emptive detentions) are not currently addressed.
#
# ── EFFECTIVE (what to add) ──────────────────────────────────────────────────
#
# Add under african_context:
#
#   algeria_hirak:
#     description: |
#       The Hirak movement (Feb 2019 – Mar 2020, resumed 2021) consisted of
#       large, recurring weekly Friday marches across Algeria. Key coding notes:
#     rules:
#       - "Weekly Friday marches are DEMONSTRATION_MARCH events. Each Friday march
#         is a distinct event even when articles describe it as 'the weekly march'."
#       - "Hirak had no formal organisation. Set organizer: null. Do NOT infer an
#         organiser from protest slogans or social media pages."
#       - "Confidence ceiling: MEDIUM for all Hirak events. Algeria is CIVICUS-rated
#         repressed; organisers stayed anonymous to avoid prosecution."
#       - "Pre-emptive arrests (before a planned march) → extract as a separate
#         event: event_type: demonstration_march, state_response: arrests,
#         outcome: dispersed, outcome_notes: 'pre-emptive detention prevented march'."
#       - "If the article gives only 'Friday' or 'last Friday' as the date with no
#         calendar date → set event_date: null; record the article_date so the
#         pipeline can approximate the event week."
#       - "Hirak slogans in Arabic ('يتنحاو قاع' — they must all go) are political
#         demands. Include them in claims even if the article does not translate them."
#
# ── INEFFECTIVE (do NOT write like this) ─────────────────────────────────────
#
# INEFFECTIVE: "Algeria protests are complicated because of political situation."
#   Why bad: Tells the coder nothing actionable. The rule must specify exactly
#   which features of Algerian protest reporting affect which coding decisions
#   (organiser → null, confidence → medium, pre-emptive arrest → how to code).
#
# INEFFECTIVE: "Hirak events should be coded carefully."
#   Why bad: 'Carefully' is not a decision rule. Every event should be coded
#   carefully. The rule must specify what is different about Hirak events and
#   what procedural step that difference requires.
#
# ── SOURCE TO VERIFY ─────────────────────────────────────────────────────────
