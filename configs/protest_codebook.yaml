# Protest Event Codebook for LLM Classification
# Aligned with Meta Codebook & Halterman & Keith (2025)
# Author: Your Name
# Created: March 2026
# Version: 2.4 — Decision-rule additions on top of v2.3
#
# Revision notes (v2.4):
#   - Change 1: confrontation/riot operational threshold
#               (primary action + secondary indicator; tyre-burning blockade rule)
#   - Change 2: occupation_seizure duration gate replaced with intent-to-remain rule
#   - Change 3: petition_signature online-only confidence cap and hybrid-event rule
#   - Change 4: hunger_strike prison + announcement + significance rules
#   - Change 5: protest_adjacent_downgrade confidence modifier
#   - Change 6: algeria_hirak country-specific coding rules
#
# Revision notes (v2.3):
#   - Boundary negative examples and confusable-pair decision rules for all 8 event types
#   - Africa-specific positive examples added to confrontation, occupation_seizure,
#     vigil, hunger_strike, petition_signature, strike_boycott
#   - Expanded disqualify_immediately: parliamentary delegations, military parades,
#     shareholder meetings, NGO conferences, religious services, inter-communal violence
#   - New non_event category: mob_violence_inter_communal (ACLED 2024)
#   - Expanded african_context: state ceremonies, digital mobilisation, WhatsApp
#     organiser note, CIVICUS civic space confidence modifier
#   - New edge cases: simultaneous_distributed_blockades, digital_protest_online_only,
#     whatsapp_organiser
#   - New state_response_vocabulary section with 4 new sub-types:
#     legal_criminalisation, anti_terrorism_designation, organisational_dissolution,
#     non_association_bail (from criminalisation of climate protest literature, 2025)
#   - confidence_guidance: civic_space_downgrade modifier added
#
# Revision notes (v2.2):
#   - Non-event disqualifiers and minimum_criteria gate from v1.1
#   - Expanded non_events covering all observed false positives from first pipeline run
#   - African/Global South context section from v1.1
#   - Type aliases for extractor normalisation from v1.1
#   - vigil and hunger_strike event types from v2.1
#   - turmoil_level derived field from v2.1
#   - LLM backend: Claude API (Anthropic)

metadata:
  title: "Protest Event Codebook for LLM Classification — Global South Focus"
  description: |
    Type III Stipulative definitions for zero-shot and few-shot event classification.
    v2.2 combines non-event filtering (v1.1) with vigil/hunger_strike types and
    turmoil_level derived field (v2.1).
  temporal_scope: "Any time period"
  geographic_scope: "Global South / non-Western contexts (primary); English and translated sources"
  source_datasets: ["ACLED", "PolDem", "FARPE", "Meta Codebook"]
  unit_of_analysis: "Individual protest event"
  minimum_participants: 2
  llm_backend: "Azure AI Foundry (gpt-5.4)"
  version: "2.4"
  last_updated: "2026-05-07"

# ============================================================================
# MINIMUM CRITERIA — ALL must be satisfied before any event is coded
# ============================================================================
#
# Before assigning any event type, verify ALL of the following:
#
minimum_criteria:
  1_collective_action: "≥2 people acting together (exception: hunger_strike can be 1 person)"
  2_public_setting: "Action takes place in public space or targets a public/institutional audience"
  3_political_motivation: "Explicit political motivation, grievance, or demand stated or strongly implied"
  4_voluntary_contention: "Action is chosen by participants (not a natural disaster, accident, or armed attack by external forces)"
  5_not_institutional: "Action is OUTSIDE normal institutional channels (not a scheduled conference, board meeting, parliamentary vote, or legal proceeding)"
  6_real_world_action: "Physical action occurred (not a planned future event, proposal, or retrospective policy discussion)"

  disqualify_immediately:
    - "Article is about scheduled meetings, conferences, or official gatherings of government/institutions"
    - "Article describes armed conflict, terrorism, or military operations"
    - "Article describes economic or trade activity (exports, imports, donations, investments)"
    - "Article is a phone call, interview, or statement by a public official"
    - "Article describes a sports match, cultural celebration, or entertainment event"
    - "Article describes natural disasters, accidents, or crashes"
    - "Article is an analysis, commentary, or academic discussion ABOUT protest (not reporting one)"
    - "Article is about legal proceedings, court judgments, or electoral processes"
    - "Article describes a parliamentary march or official delegation visiting a site (institutional representation, not protest)"
    - "Article describes a police or military parade, ceremony, or official drill"
    - "Article describes a private company shareholder meeting or investor activism without political demand targeting public policy"
    - "Article describes an NGO, civil society, or international organisation conference or seminar (not a protest)"
    - "Article describes a religious service, prayer meeting, or church gathering with no explicit political demand directed at authorities"
    - "Article describes inter-communal or ethnic mob violence between civilian groups with no stated political demand targeting the state or public institutions"

# ============================================================================
# TYPE ALIASES
# ============================================================================
#
# Accepted synonyms during extraction — normalised to canonical keys downstream.
#
type_aliases:
  "demonstration": "demonstration_march"
  "march": "demonstration_march"
  "rally": "demonstration_march"
  "protest": "demonstration_march"
  "strike": "strike_boycott"
  "general_strike": "strike_boycott"
  "general strike": "strike_boycott"
  "boycott": "strike_boycott"
  "walkout": "strike_boycott"
  "riot": "riot"
  "uprising": "riot"
  "violent protest": "riot"
  "occupation": "occupation_seizure"
  "sit-in": "occupation_seizure"
  "sit_in": "occupation_seizure"
  "blockade": "occupation_seizure"
  "confrontation": "confrontation"
  "picket": "confrontation"
  "petition": "petition_signature"
  "vigil": "vigil"
  "candlelight vigil": "vigil"
  "hunger strike": "hunger_strike"
  "hunger_strike": "hunger_strike"

# ============================================================================
# CORE EVENT TYPES
# ============================================================================
#
# IMPORTANT: Use the exact key names below as the event_type value.
# Valid keys: demonstration_march | strike_boycott | riot | occupation_seizure
#             | confrontation | petition_signature | vigil | hunger_strike
#

event_types:

  demonstration_march:
    name: "Demonstration or March"
    definition: |
      A public gathering where ≥2 people intentionally assemble in physical space
      for a concentrated time period (typically 1-8 hours) to express political demands,
      grievances, or support for a cause. Participants engage in PEACEFUL actions
      such as chanting, holding signs, speeches, or walking together (no violence).
      Must have explicit political motivation or public purpose.

    positive_examples:
      - "500 workers gathered outside factory demanding wage increases and better benefits"
      - "Climate activists held a 3-hour march through downtown with signs reading 'Save Our Planet'"
      - "Labor union organized peaceful rally outside city hall to protest pension cuts"
      - "2,000 people demonstrated in streets supporting voting rights for undocumented immigrants"
      - "Nigerian civil society groups marched on the National Assembly demanding fuel subsidy reversal"
      - "South African students held demonstrations at multiple campuses over the #FeesMustFall demands"
      - "Ugandan opposition supporters gathered outside Electoral Commission offices to protest vote-rigging"

    negative_examples:
      - "Individual person standing alone with sign (lacks ≥2 people threshold)"
      - "Online petition or social media discussion about a cause (not physical assembly)"
      - "News report ABOUT a protest (the article itself is not the protest event)"
      - "Church service or religious gathering (not explicitly political assembly)"
      - "SADC summit or African Union meeting (institutional, not protest)"
      - "Economic conference attended by government officials and economists"
      - "Community celebration or cultural festival with political speeches"
      - "Press conference by political party announcing policy position"
      - "Town hall meeting where residents discussed policy with officials (deliberation, not protest)"
      - "Religious march or procession with no political demands directed at authorities"
      - "State-organised independence day parade or national day celebration"

    decision_rules:
      - "IF participants ≥2 AND physically assembled AND expressing political demands AND non-violent → DEMONSTRATION_MARCH"
      - "IF peaceful demonstration escalates to violence during same time period → RIOT (escalation takes priority)"
      - "IF demonstration is part of larger strike (e.g., striking workers march) → STRIKE_BOYCOTT (more specific)"
      - "IF duration < 15 minutes AND no specific political claim → consider CONFRONTATION instead"
      - "IF ≥5,000 people AND described as 'unruly' or 'massive turnout' → still DEMONSTRATION if non-violent"
      - "IF march passes by a building without physically blocking access → DEMONSTRATION_MARCH (not CONFRONTATION)"
      - "IF participants begin moving through public space with chants or banners → DEMONSTRATION_MARCH (not VIGIL, even if it started as one)"

    # confidence_threshold is used by Stage 2 recheck_borderline() via codebook_manager.py.
    # It is NOT injected into the LLM prompt. Do not remove or rename this field.
    confidence_threshold: 0.70
    codebook_equivalents:
      acled: "Protests"
      poldem: "Demonstration, protest march (code 3 or 6)"
      farpe: "Public assembly, March/demonstration"
      capt: "Rally, March"

    temporal_markers:
      - "gathered"
      - "assembled"
      - "marched"
      - "demonstrated"
      - "protested"
      - "rally"
      - "march"
      - "took to the streets"
      - "poured into the streets"
    actor_typically:
      - "Labor unions"
      - "Civil rights groups"
      - "Environmental organizations"
      - "Community groups"
      - "Political parties (acting as protest organiser, not in official capacity)"
      - "Spontaneous protesters"
      - "Students"
      - "Women's groups"

  strike_boycott:
    name: "Strike or Boycott"
    definition: |
      Organized refusal to work (strike) or organized refusal to consume/use a product,
      service, or institution (boycott) as a form of collective protest. Action must be
      INTENTIONAL and ORGANIZED (not individual choice). Participants halt production,
      refuse to work shifts, or organize coordinated non-consumption to pressure targets
      into policy change or wage/benefit improvements.

    positive_examples:
      - "Union members refused to work, shutting down production at automotive factory"
      - "Organized consumer boycott of company products to protest labor practices"
      - "Teachers' union called members out on strike, closing schools across district"
      - "Bus drivers coordinated week-long strike demanding pension improvements"
      - "South African public sector workers downed tools in nationwide strike over wage dispute"
      - "Nigerian oil workers threatened to strike unless government reverses fuel policy"
      - "Algerian civil servants staged a general strike against austerity measures"
      - "Zambian mineworkers at Konkola Copper Mines downed tools demanding unpaid wages"

    negative_examples:
      - "Individual worker decided not to go to work (personal choice, not organized)"
      - "Shoppers choosing not to buy a brand (market choice, not political boycott)"
      - "Mass sick day not organised by any group (spontaneous, not collective action)"
      - "Company shutting down production due to supply chain issues (not a labor action)"
      - "Parliament refusing to pass a bill (institutional channel, not protest)"
      - "Union announces it is considering a strike next month (planned/future — action has not yet begun)"
      - "Workers informally slow down production without a union call or public announcement"

    decision_rules:
      - "KEY: Must be ORGANIZED (union call, group coordination, publicly announced)"
      - "Individual refusal without organization → NOT a strike/boycott"
      - "IF work stoppage explicitly tied to demands → STRIKE"
      - "IF refusal to consume tied to political goal → BOYCOTT"
      - "IF strike is announced but not yet started → do NOT code (extract only when action has begun)"

    confidence_threshold: 0.75
    codebook_equivalents:
      acled: "Protests (specific to strikes)"
      poldem: "Strike (code 1), Boycott (code 11)"
      capt: "Strike"

    temporal_markers:
      - "strike"
      - "boycott"
      - "refused to work"
      - "downed tools"
      - "work stoppage"
      - "shutdown"
      - "coordinated refusal"
      - "general strike"
      - "industrial action"

  riot:
    name: "Riot or Violent Protest"
    definition: |
      Unorganized or loosely organized violent collective action where ≥2 participants
      destroy property and/or attack persons. May BEGIN as peaceful protest but ESCALATE
      to violence, OR may be violent from start. Key characteristic: participants are
      clearly identified as engaging in VIOLENCE (not police response to peaceful protest).
      Violence must be initiated by protesters, not reaction to state repression.

    positive_examples:
      - "During protest march, group of youths broke shop windows and clashed with police"
      - "Rioters set fires to vehicles and fought with security forces"
      - "Violent confrontation resulted in 15 injured and 30 arrests"
      - "Looters and arsonists took over downtown streets for several hours"
      - "Post-election violence erupted as supporters of losing candidate burned vehicles"
      - "Post-election protests in Lagos turned violent as opposition supporters clashed with police and set vehicles ablaze"

    negative_examples:
      - "Police used tear gas against peaceful protesters (police action, not riot)"
      - "Peaceful march where police initiated violence (still DEMONSTRATION_MARCH)"
      - "Police fired rubber bullets at an otherwise peaceful crowd (state repression, not protester-initiated riot)"
      - "Property damage from weather or accident (not collective political violence)"
      - "Verbal fight between individuals on political topic (not collective action)"
      - "Military or armed group attacks civilians (armed conflict, not protest riot)"
      - "Terrorist attack or insurgency action (out of scope)"
      - "Inter-communal ethnic clashes between two civilian groups without political demand targeting the state (mob violence — return [])"
      - "Xenophobic attacks on foreign nationals without state-directed political demand (non-event — return [])"

    decision_rules:
      - "CRITICAL: Violence must be initiated by PROTESTERS, not state/police response"
      - "IF peaceful protest → police use force → DEMONSTRATION_MARCH (not riot)"
      - "IF some violence during event, ask: was it majority participant action or minority?"
      - "IF minority broke off to riot while main group stayed peaceful → code as TWO EVENTS"
      - "When in doubt: favor peaceful classification (assume force was provoked by police)"
      - "IF article describes armed attack by militia/military → NOT a protest event"
      - "IF violence is between two civilian groups with no political demand targeting state or institution → NOT a protest riot, return []"
      - "IF stone-throwing, tyre-burning, or deliberate property destruction is the PRIMARY reported action (not a brief or incidental incident) AND at least ONE of the following is also reported: arrests, injuries, security force deployment → RIOT. 'Primary' means the article's headline or lead paragraph characterises the event through the violence, not the march."
      - "IF the same event begins as a march and transitions to property damage mid-event → RIOT (escalation takes priority; use the date of the march for event_date, note the transition in outcome_notes)."

    confidence_threshold: 0.80
    codebook_equivalents:
      acled: "Riots"
      poldem: "Protest violently or riot (code 34-35)"
      capt: "Riot"

    temporal_markers:
      - "riot"
      - "violent clash"
      - "violent protest"
      - "looting"
      - "arson"
      - "burning vehicles"
      - "fighting"
      - "clashed with"
      - "petrol bombs"
      - "stone throwing"

  occupation_seizure:
    name: "Occupation or Building Seizure"
    definition: |
      Occupation of physical space (building, plaza, street, land) by ≥2 protesters
      for extended period (≥2 hours typically, can range from hours to weeks) to
      express demands or exert pressure through physical presence. Action is usually
      non-violent but represents direct action seizing control of space. Examples:
      sit-ins, encampments, takeovers of buildings/offices.

    positive_examples:
      - "Activists occupied plaza for 3 weeks, setting up camp to protest austerity measures"
      - "Students sat in at university administration building demanding policy change"
      - "Protesters blocked entry to government office for 24 hours"
      - "Movement established autonomous zone with barriers and tents in downtown area"
      - "University of Nairobi students occupied the administration block for 36 hours demanding fee reduction"
      - "South African farmworkers occupied farm owner's office building to demand back pay"

    negative_examples:
      - "Brief blockade lasting <15 minutes (better classified as CONFRONTATION)"
      - "A brief 20-minute sit-down at an entrance before dispersing (too short — CONFRONTATION)"
      - "Occupying own private property for reasons unrelated to protest"
      - "Military occupation or territorial seizure by armed forces (conflict, not protest)"

    decision_rules:
      - "KEY: Intent to remain (stated or implied) is the gate, not duration. Duration is evidence of intent, not a threshold."
      - "IF just blocking passage without occupying space → CONFRONTATION"
      - "IF protesters physically control a space (building, entrance, public square) with stated or implied intent to remain until demands are met → OCCUPATION_SEIZURE, regardless of actual duration. A sit-in dispersed by police after 20 minutes still qualifies if the participants declared they would stay."
      - "IF the article reports only that protesters 'gathered outside' or 'blocked the entrance briefly' without any indication of intent to remain → CONFRONTATION, not OCCUPATION_SEIZURE."
      - "Armed groups taking territory → NOT a protest event"
      - "IF article describes occupation AND hunger strike → HUNGER_STRIKE (more specific form takes priority)"

    confidence_threshold: 0.75

  confrontation:
    name: "Confrontation (Direct Action, Non-Violent)"
    definition: |
      Intentional, direct engagement with authorities, institutions, or counter-protesters
      through non-violent confrontational actions (not violence, not peaceful demonstration).
      Examples: blocking roads/pathways, surrounding buildings, surrounding individuals,
      picketing, disrupting events, entering restricted areas. Purpose is to obstruct,
      interrupt, or directly challenge through physical presence rather than walking/standing.

    positive_examples:
      - "Activists blocked entrance to government building, preventing workers from entering"
      - "Group surrounded police vehicle and prevented it from leaving"
      - "Protesters disrupted political rally by interrupting speakers"
      - "Activists picketed outside corporate headquarters"
      - "South African community members barricaded the N2 highway with burning tyres, demanding service delivery from the municipality"
      - "Ugandan opposition activists blocked the road outside Electoral Commission offices"

    negative_examples:
      - "People simply standing in crowd (classification: DEMONSTRATION_MARCH)"
      - "Violence or property destruction (classification: RIOT)"
      - "Organized work stoppage (classification: STRIKE_BOYCOTT)"
      - "Diplomatic confrontation between countries (not a protest event)"
      - "Verbal argument between public officials or politicians"
      - "Security guards removing a single trespasser (not collective action — minimum 2 participants required)"
      - "A march or rally that passes near but does not physically block a building (DEMONSTRATION_MARCH)"

    decision_rules:
      - "Distinguish from DEMONSTRATION_MARCH: Confrontation requires intentional physical obstruction or interruption of access/activity"
      - "Distinguish from RIOT: Confrontation is intentional but non-violent"
      - "Distinguish from OCCUPATION_SEIZURE: Confrontation blocks or disrupts but does not establish sustained presence (< 2 hours typically)"
      - "IF burning tyres or debris are used to block a road → CONFRONTATION (roadblock is the action; fire is a tactic, not violence against persons)"
      - "IF protesters block a road or building using burning tyres or debris BUT no persons are attacked and no looting is reported → CONFRONTATION, not RIOT. Burning objects as a blockade tactic is confrontation; burning objects as an expression of rage against persons or property is riot."

    confidence_threshold: 0.70

  petition_signature:
    name: "Petition, Letter Campaign, Signature Collection"
    definition: |
      Organized collection of signatures on petitions, letter-writing campaigns, or
      formal written demands. Must involve ACTIVE collection/organization (e.g., public
      petition table, coordinated email campaign), not just individuals signing.
      Excludes online petitions or social media unless explicitly part of organized campaign.

    positive_examples:
      - "Group set up table to collect signatures for petition demanding park preservation"
      - "Union coordinated letter-writing campaign to legislators demanding wage increase"
      - "Civil society coalition launched petition with 50,000+ signers to parliament"
      - "Nigerian civil society coalition launched petition with 100,000 signatures demanding SARS disbandment"
      - "South African student groups coordinated #FeesMustFall social media campaign with explicit demand to halt fee increases, alongside physical demonstrations"

    negative_examples:
      - "Individual posts petition online without organizing others"
      - "Person signs petition they found (signing alone, not organizing)"
      - "Government publishing a public report or statement"
      - "An online poll or social media hashtag campaign without evidence of organized coordination or explicit political demand"
      - "A social media trend discussing a political topic without a specific addressee or demand"

    decision_rules:
      - "Online-only campaigns (hashtags, digital strikes, social media blackouts) qualify ONLY when they carry an explicit political demand AND show evidence of organized coordination — not individual signing or trending"
      - "IF an online campaign accompanies a physical protest → code the physical event as its primary type; note the online component in outcome_notes"
      - "IF petition was collected online only (no physical gathering or delivery ceremony) → PETITION_SIGNATURE, confidence maximum MEDIUM. Online petitions are borderline on minimum criterion 2 (public setting). Include only if there is clear evidence of political targeting (named recipient, formal submission to a government body)."
      - "IF a physical march or rally accompanied the petition delivery → extract as PETITION_SIGNATURE (the delivery is the culminating tactic). The march is part of the same event, not a separate DEMONSTRATION_MARCH. Exception: if the march is itself large and politically significant (>500 people, major city) and the petition delivery is incidental → DEMONSTRATION_MARCH, note petition in claims."
      - "IF detainees submit a written letter of demands as part of a hunger strike → do NOT extract as a separate PETITION_SIGNATURE. Written demands are a normal incident of a hunger strike, not a distinct event."

    confidence_threshold: 0.65

  vigil:
    name: "Vigil or Commemorative Assembly"
    definition: |
      A solemn, typically silent or quiet gathering of ≥2 people to mourn, remember,
      or bear witness — often in response to a tragedy, death, or injustice. May be
      explicitly political (e.g., demanding justice, policy change) or primarily
      commemorative. Candles, flowers, and silence are characteristic markers.
      Duration is typically 30 minutes to several hours.

    positive_examples:
      - "Hundreds gathered by candlelight outside parliament to mourn victims of police shooting"
      - "Community held silent vigil demanding justice after teenager killed by officers"
      - "Activists organized overnight vigil outside prison the night before an execution"
      - "Mourners held memorial rally calling for gun reform after school shooting"
      - "Families of Marikana massacre victims held candlelight vigil outside Parliament demanding justice and accountability"
      - "Ugandan activists gathered in silent vigil outside Kampala police headquarters after opposition member died in custody"

    negative_examples:
      - "Private funeral or memorial service not open to public"
      - "Religious service that makes no political demands"
      - "Spontaneous crowd gathering at accident scene (no political intention)"
      - "A religious ceremony commemorating a historical event with no political demand to authorities"
      - "A church service marking a religious anniversary (no political claim)"

    decision_rules:
      - "IF vigil explicitly demands policy change or accountability → classify as VIGIL (not DEMONSTRATION)"
      - "IF vigil turns into march or active protest → recode primary type as DEMONSTRATION_MARCH"
      - "Solemn atmosphere and symbolic acts (candles, flowers, silence) are key markers"
      - "IF gathering is a religious ceremony with no political demand → NOT a vigil, return []"

    confidence_threshold: 0.70
    codebook_equivalents:
      acled: "Protests"
      capt: "Vigil"

    temporal_markers:
      - "vigil"
      - "candlelight"
      - "mourners"
      - "silent protest"
      - "remembrance"
      - "memorial rally"
      - "bear witness"

  hunger_strike:
    name: "Hunger Strike or Self-Deprivation Protest"
    definition: |
      Individual or collective act of refusing food (or other self-deprivation) as a
      form of protest to pressure authorities or draw attention to demands. Must be
      publicly declared and politically motivated. Can be individual (one person) or
      collective (multiple participants, often simultaneously). Duration is typically
      days to weeks.

    positive_examples:
      - "Political prisoner announced hunger strike demanding release and fair trial"
      - "Detained migrants began collective hunger strike to protest detention conditions"
      - "Activist went on indefinite hunger strike outside government ministry demanding land rights"
      - "Six prisoners simultaneously refused food to demand reform of solitary confinement"
      - "Jailed Ugandan opposition politician declared hunger strike demanding fair trial conditions"
      - "Ethiopian journalist on hunger strike in pre-trial detention demanding access to legal counsel"
      - "Twelve opposition detainees at Luzira Prison announced a hunger strike via their lawyers, demanding release on bail (Uganda)"
      - "Imprisoned civil society leaders refused food for ten days to protest their detention under anti-terrorism laws (Ethiopia)"
      - "Former presidential candidate on hunger strike at military hospital demanding access to legal counsel (Algeria)"

    negative_examples:
      - "Person skips meals due to poverty (not a declared protest act)"
      - "Private fast for religious reasons (no political claim)"
      - "Person threatens hunger strike but does not begin one"
      - "An individual refuses hospital food out of frustration or personal distress (not publicly declared, not political)"
      - "Religious fast (Ramadan, Lent) with no stated political demand"

    decision_rules:
      - "Must be PUBLICLY DECLARED (announced to media, authorities, or public)"
      - "Must have EXPLICIT POLITICAL DEMAND or grievance"
      - "Can be a single individual (minimum participants rule does not apply)"
      - "IF hunger strike combined with occupation → code as HUNGER_STRIKE (more specific)"
      - "IF person merely threatens or says they will begin → do NOT code (action must have started)"
      - "Prison hunger strikes ARE included when ALL THREE of these hold: (a) demands are political (not personal, e.g. not 'better food'), (b) the hunger strike is publicly announced (via lawyer, family statement, or press release — not just rumour), and (c) ≥2 people, OR 1 person of clear public significance (named activist, elected official, known opposition figure)."
      - "Private food refusal by a detainee with no public announcement and no political demand → NOT included. The action must be knowingly public."
      - "IF a hunger strike is collective AND public AND political but the article is primarily about the government's response (prison conditions report, parliamentary question) → STILL extract the hunger_strike event. Apply confidence downgrade for protest-adjacent reporting."

    confidence_threshold: 0.75
    codebook_equivalents:
      acled: "Protests"
      poldem: "Hunger strike (code 12)"

    temporal_markers:
      - "hunger strike"
      - "refused food"
      - "fasting in protest"
      - "starvation protest"
      - "went without food"

# ============================================================================
# DERIVED OUTPUT FIELD: TURMOIL LEVEL
# ============================================================================

turmoil_level:
  description: |
    A derived summary field indicating the overall intensity of a protest event,
    combining information about state response, violence, arrests, fatalities, and
    injuries. Computed automatically from extracted fields — NOT extracted directly
    from the article text.

  values:
    high:
      label: "High turmoil"
      criteria:
        - "Fatalities reported (fatalities > 0)"
        - "State response includes live_ammunition or rubber_bullets"
        - "Outcome is 'escalated'"
        - "Injuries reported AND arrests made simultaneously"
      examples:
        - "Police opened fire on crowd, killing 2 and injuring 15"
        - "Security forces fired live rounds as riot escalated; 30 arrested"

    medium:
      label: "Medium turmoil"
      criteria:
        - "State response includes teargas, water_cannon, or dispersal"
        - "Injuries reported (but no fatalities)"
        - "Arrests made"
        - "Outcome is 'arrested' or 'dispersed' with force"
      examples:
        - "Police dispersed protesters with tear gas; 10 arrested"
        - "Three protesters injured in clashes with security forces"

    low:
      label: "Low turmoil"
      criteria:
        - "No state response OR state response is 'monitoring' only"
        - "No injuries or fatalities"
        - "Outcome is 'ongoing', 'demands_met', or 'partial_concession'"
        - "Peaceful event with no escalation reported"
      examples:
        - "Peaceful march concluded without incident"
        - "Protesters delivered petition; officials agreed to meet"

  derivation_logic: |
    Evaluate in order:
    1. IF fatalities > 0 OR state_response IN [live_ammunition, rubber_bullets]
       OR outcome == escalated → turmoil_level = high
    2. ELSE IF state_response IN [teargas, water_cannon, dispersal, arrests]
       OR injuries is not null/zero → turmoil_level = medium
    3. ELSE → turmoil_level = low

# ============================================================================
# NON-EVENTS — Explicit Exclusions
# ============================================================================
#
# DO NOT extract these as protest events.
# If the article is primarily about one of these, return an empty array [].
#
non_events:

  - category: "Armed conflict / terrorism / insurgency"
    examples:
      - "Armed group attacks government targets"
      - "Military operations or airstrikes"
      - "Terrorist bombing or attack"
      - "Helicopter crash during military operation"
      - "Armed rebel group seizes territory"
    reason: "Beyond scope of protest event analysis; see conflict datasets (ACLED armed conflict, GTD)"

  - category: "Conferences, summits, and official meetings"
    examples:
      - "SADC summit attended by regional heads of state"
      - "African Union ministerial meeting"
      - "Economic conference or business forum"
      - "Government review meeting or budget session"
      - "International organisation convening member states"
      - "Economists presenting research at a forum"
    reason: "Institutional activity through normal channels, not contentious collective action"

  - category: "Phone calls, press conferences, and statements"
    examples:
      - "President calls counterpart to discuss bilateral ties"
      - "Minister holds press conference on policy"
      - "Official issues statement condemning violence"
      - "Spokesperson announces government position"
    reason: "Communication, not collective public action"

  - category: "Celebrations, ceremonies, and cultural events"
    examples:
      - "Independence Day celebrations"
      - "Religious festival or national holiday gathering"
      - "Victory celebration after sports match"
      - "Cultural parade or carnival"
      - "Presidential inauguration ceremony"
    reason: "No political contention or grievance expressed; gathering is celebratory"

  - category: "Sports matches and entertainment"
    examples:
      - "Football match or sports tournament"
      - "Concert or music festival"
      - "National team competition"
    reason: "No protest element"

  - category: "Economic and trade activity"
    examples:
      - "Country exports commodities to trading partner"
      - "Trade delegation signs agreement"
      - "Foreign investment or donation announced"
      - "Import/export statistics released"
    reason: "Economic activity, not collective protest action"

  - category: "Natural disasters and accidents"
    examples:
      - "Helicopter crash kills passengers"
      - "Flood displaces communities"
      - "Industrial accident at factory"
    reason: "Not voluntary collective action"

  - category: "Diplomatic events and international relations"
    examples:
      - "Countries hold bilateral talks"
      - "Peace negotiations between warring parties"
      - "Diplomatic expulsion of ambassador"
      - "International court ruling"
    reason: "Institutional/governmental activity, not protest"

  - category: "Legal and electoral processes"
    examples:
      - "Court verdict or sentencing"
      - "Election results announced"
      - "Parliament votes on legislation"
      - "Constitutional amendment passed"
    reason: "Outcomes of formal institutions, not protest events (though protests may FOLLOW these)"

  - category: "Humanitarian and aid activity"
    examples:
      - "Aid convoy delivers food to conflict zone"
      - "NGO distributes supplies"
      - "Refugee camp established"
    reason: "Not contentious collective action by protesters"

  - category: "War and inter-state conflict"
    examples:
      - "Ongoing armed conflict between states"
      - "Military advance or retreat"
      - "Siege of city by armed forces"
    reason: "Distinct from protest events; use dedicated conflict datasets"

  - category: "Private mourning with no political claim"
    examples:
      - "Family funeral for a political figure"
      - "Private memorial not open to public"
    reason: "No collective public protest element"

  - category: "Mob violence and inter-communal conflict"
    examples:
      - "Ethnic clashes between two communities over land or grazing rights"
      - "Xenophobic attacks on foreign nationals by local residents"
      - "Inter-communal violence between rival groups with no political demand targeting the state"
      - "Vigilante action against alleged criminals"
    reason: |
      Per ACLED 2024 codebook revision: 'mob violence' is coded as inter-communal
      conflict without state targeting — distinct from protest riots. These events lack
      a political demand directed at state or public institutions. Do not code as RIOT.

# ============================================================================
# AFRICAN / GLOBAL SOUTH CONTEXT NOTES
# ============================================================================

african_context:

  regional_organizations_not_protests:
    note: "SADC, AU, ECOWAS, IGAD, COMESA summits and meetings are NOT protest events"
    examples:
      - "SADC heads of state summit → NOT a protest"
      - "AU Commission meeting → NOT a protest"
      - "ECOWAS mediation mission → NOT a protest"
      - "IGAD special envoy visit → NOT a protest"
      - "COMESA trade ministerial → NOT a protest"

  state_ceremonies_not_protests:
    note: "State-organised ceremonies, parades, and traditional events are NOT protests"
    examples:
      - "National independence day celebration or parade → NOT a protest"
      - "Presidential inauguration ceremony → NOT a protest"
      - "Traditional chieftaincy ceremony or royal investiture → NOT a protest"
      - "Military or police passing-out parade → NOT a protest"
      - "Sports victory parade organised by government → NOT a protest"

  protest_specific_to_region:
    note: "Common African protest forms that DO qualify — include these positive examples in classification"
    examples:
      - "Street demonstrations against fuel price increases (Nigeria, Zimbabwe, etc.)"
      - "Anti-austerity marches (South Africa, Zambia, Kenya)"
      - "Land rights protests (South Africa, Kenya, Zimbabwe)"
      - "Post-election protests and demonstrations (widespread)"
      - "Student protests over fees, accommodation (South Africa, Uganda)"
      - "Labour strikes in mining, public sector (South Africa, Zambia)"
      - "Anti-government demonstrations in Algeria (ongoing since Hirak 2019)"
      - "Road blockades with burning tyres over service delivery failures (South Africa townships)"
      - "Market shutdowns by traders protesting tax policy (West Africa)"
      - "Youth civic movement protests (Y'en a marre in Senegal, Balai Citoyen in Burkina Faso)"
      - "EndSARS-style police brutality protests (Nigeria and diaspora solidarity actions)"

  digital_mobilisation_note:
    note: |
      African protests are frequently organised through private messaging apps (WhatsApp,
      Telegram). Such protests may appear organiser-less or 'spontaneous' in news text even
      when carefully coordinated by identifiable groups or networks.
    rule: |
      IF no formal organisation is named → code organizer as 'unknown'; do NOT assume
      'spontaneous' solely because no organisation is named. Record any movement names,
      hashtags, or collective identifiers mentioned in the article in organizer field.

  civic_space_confidence_modifier:
    note: |
      Protests in countries with severely restricted civic space are systematically
      under-reported in independent media. Protest events from these countries are more
      likely to be incomplete, unconfirmed, or sourced from a single outlet. Apply an
      automatic confidence downgrade. Source: CIVICUS Monitor 2023-24; CASE 2025.
    repressed_countries:
      - "Cameroon"
      - "Democratic Republic of Congo"
      - "Ethiopia"
      - "Tanzania"
      - "Uganda"    # CIVICUS Monitor 2023-24: Repressed; pipeline target country (UG)
    closed_countries:
      - "Eritrea"
      - "Sudan"
    rule: |
      IF country is in repressed_countries AND field-completeness would yield 'high'
      confidence → downgrade to 'medium'.
      IF country is in closed_countries → cap confidence at 'low' regardless of
      field completeness.

  country_filter_note: |
    This pipeline targets African countries. If an extracted event is set in a country
    outside Africa AND the article source is also non-African, set confidence to 'low'
    and flag in outcome_notes. India, Pakistan, Iran, Turkey, China, and European
    countries are outside the primary scope of this dataset.

  algeria_hirak:
    description: |
      The Hirak movement (Feb 2019 – Mar 2020, resumed 2021) consisted of
      large, recurring weekly Friday marches across Algeria. Key coding notes:
    rules:
      - "Weekly Friday marches are DEMONSTRATION_MARCH events. Each Friday march is a distinct event even when articles describe it as 'the weekly march'."
      - "Hirak had no formal organisation. Set organizer: null. Do NOT infer an organiser from protest slogans or social media pages."
      - "Confidence ceiling: MEDIUM for all Hirak events. Algeria is CIVICUS-rated repressed; organisers stayed anonymous to avoid prosecution."
      - "Pre-emptive arrests (before a planned march) → extract as a separate event: event_type: demonstration_march, state_response: arrests, outcome: dispersed, outcome_notes: 'pre-emptive detention prevented march'."
      - "If the article gives only 'Friday' or 'last Friday' as the date with no calendar date → set event_date: null; record the article_date so the pipeline can approximate the event week."
      - "Hirak slogans in Arabic (e.g. 'yetnahaw gaa' / they must all go) are political demands. Include them in claims even if the article does not translate them."

# ============================================================================
# EDGE CASES & DISAMBIGUATION
# ============================================================================

edge_cases:

  multi_event_same_day:
    description: "Multiple different protests in same city on same day"
    rule: "Code as SEPARATE events IF different location, actors, or goals. Code as ONE if same location/actors/goals, different times."
    example: "Morning protest at city hall, evening march at courthouse → TWO EVENTS"

  escalation_during_event:
    description: "Peaceful protest that escalates to violence"
    rule: "If most participants remain peaceful → DEMONSTRATION_MARCH. If majority escalates → RIOT. If small group breaks off → TWO EVENTS"
    example: "March stays peaceful, 50 people break off and loot → code march as DEMONSTRATION_MARCH, looting as separate RIOT"

  ongoing_occupation:
    description: "Multi-day occupation"
    rule: "Code as ONE OCCUPATION_SEIZURE event if continuous. If broken up then resumed elsewhere, may be TWO events"

  counter_protest:
    description: "Opposing groups protesting same topic or location"
    rule: "If separated spatially/temporally → TWO EVENTS. If directly confronting → ONE CONFRONTATION event or TWO DEMONSTRATIONS with note"

  vigil_to_demonstration:
    description: "Vigil that transitions into an active march or demonstration"
    rule: "If vigil transitions into active march or chanting → recode as DEMONSTRATION_MARCH. If it remains solemn throughout → VIGIL"

  hunger_strike_in_prison:
    description: "Hunger strike by prisoners or detainees"
    rule: "Count as HUNGER_STRIKE regardless of participant count (even 1). Must be publicly declared."

  ambiguous_news_framing:
    description: "Article discusses protest but may be commentary, analysis, or retrospective"
    rule: "If the protest action occurred in the past and the article is commentary → code the underlying event if details are present. If article is purely analytical → do not extract."

  regional_organisation_protest:
    description: "Protest targeting a regional body (AU, SADC, UN) rather than a national government"
    rule: "Qualifies as a protest event if the action meets all minimum_criteria. Use the host country as 'country' field."

  simultaneous_distributed_blockades:
    description: |
      A coordinated campaign of blockades at multiple geographic locations on the same day
      (e.g. 'one day, three ports', multiple highway blockades across cities). Source: DIY
      Climate Protest literature (2025); increasingly documented in African environmental
      and service delivery protests.
    rule: |
      Code as MULTIPLE CONFRONTATION or OCCUPATION_SEIZURE events — one per location —
      not as a single combined event. Record the coordinating campaign name in organizer
      and/or outcome_notes. Do NOT collapse simultaneous distributed actions into one event
      simply because they share a single news article.
    example: "Blockade Australia 'one day, three ports' → three separate CONFRONTATION events, one per port"

  digital_protest_online_only:
    description: |
      Online-only protest forms — hashtag campaigns, social media blackouts, digital strikes
      — with no corresponding physical assembly. Source: Sorce & Dumitrica (2022).
    rule: |
      Qualify as PETITION_SIGNATURE when: (1) the campaign carries an explicit political
      demand directed at a specific authority, AND (2) there is evidence of organized
      coordination (not just individual sharing). If the online campaign accompanies a
      physical protest, code the physical event as its primary type and note the online
      component in outcome_notes.
    example: "#EndSARS with explicit demand to disband SARS unit + coordinated posting → PETITION_SIGNATURE"

  whatsapp_organiser:
    description: |
      Protests organised via private messaging apps (WhatsApp, Telegram) often appear
      leaderless or spontaneous in news text even when carefully coordinated. Source:
      WhatsApp EndSARS study (Social Media + Society, 2024).
    rule: |
      Do NOT code organizer as 'spontaneous' solely because no formal organisation is named.
      If a movement name, hashtag, or collective identity is present → use it.
      If the article uses phrases like 'residents' or 'youth' without naming a group →
      code organizer as 'unknown' and note 'possibly WhatsApp-coordinated' in outcome_notes
      if the context supports it.

# ============================================================================
# STATE RESPONSE VOCABULARY
# ============================================================================
#
# Allowed values for the state_response field.
# Select the MOST SEVERE response reported in the article.
# Multiple responses may occur — record the highest severity.
#
state_response_vocabulary:
  description: |
    Ordered from least to most severe. If multiple responses are reported,
    record the highest severity in state_response and note others in outcome_notes.
    If unclear from the article text, use "unknown".

  values:
    none: "No state response reported"
    monitoring: "Security forces present but took no action"
    dispersal: "Authorities dispersed protesters without force (verbal orders, cordons)"
    teargas: "Tear gas or pepper spray deployed"
    water_cannon: "Water cannon used against protesters"
    rubber_bullets: "Rubber bullets, birdshot, or less-lethal projectiles fired"
    live_ammunition: "Live rounds fired by security forces"
    arrests: |
      Protesters arrested or detained.
      NOTE: Use 'arrests' here when arrest/detention is the primary state response.
      Also populate the separate top-level 'arrests' field with the numeric count.
      Both fields may be non-null simultaneously — they are not mutually exclusive.
    ban: "Protest banned by authorities before or during the event"
    curfew: "Curfew imposed in response to protest activity"
    legal_criminalisation: |
      Protesters charged under a new or novel statutory offence specifically
      targeting protest tactics (e.g. infrastructure blockade laws, lock-on laws,
      anti-protest legislation). Distinct from ordinary arrest charges.
    anti_terrorism_designation: |
      Protest movement or participants labelled as a terrorist threat, security risk,
      or subjected to counter-terrorism provisions or red-tagging. Increasingly
      documented in Philippines, Ethiopia, Kenya, Cameroon.
    organisational_dissolution: |
      Protest movement or organisation legally dissolved, deregistered, or banned
      by state order (e.g. France's dissolution of Soulèvements de la Terre).
    non_association_bail: |
      Bail conditions imposed prohibiting contact between arrested activists,
      preventing future coordination. A legally targeted disruption of organising.
    unknown: "State response unclear from article text — avoid using if possible"

# ============================================================================
# OUTCOME VOCABULARY
# ============================================================================
#
# Allowed values for the outcome field.
# The canonical list is also hardcoded in SYSTEM_PROMPT (extractor.py:185-186).
# If you add or rename a value here, update extractor.py to match.
#
outcome_vocabulary:
  description: |
    Allowed values for the outcome field. Select the best description of how the
    event concluded based on information in the article. Use 'unknown' only when
    the article provides no outcome information at all.
  values:
    ongoing:            "Event is still in progress at time of article publication"
    dispersed:          "Protesters dispersed — by authorities or voluntarily — without further escalation"
    arrested:           "Key participants arrested; dispersal was primarily through detention"
    demands_met:        "Stated demands were fully met by the target authority"
    partial_concession: "Target authority made some concession but did not meet all demands"
    escalated:          "Event escalated to violence or significantly intensified after initial report"
    unknown:            "Outcome not described in article — use sparingly"

# ============================================================================
# CONFIDENCE THRESHOLDS EXPLAINED
# ============================================================================

confidence_guidance:
  high_confidence_0_85_plus:
    meaning: "Clear case, unambiguous match to definition"
    action: "Use for analysis without hesitation"
    examples:
      - "Text explicitly states 'the protest march' with number of participants, location, date, and demands"
      - "News headline 'workers strike demanding wage increase' with union name and specific demands"

  medium_confidence_0_65_to_0_84:
    meaning: "Reasonably clear but some ambiguity remains"
    action: "Use for analysis but flag in sensitivity analyses"
    examples:
      - "Report of 'gathering' that sounds political but not fully explicit about demands"
      - "Implied organization but stated informally"

  low_confidence_below_0_65:
    meaning: "Significant ambiguity, could be multiple types or borderline non-event"
    action: "Exclude from main analysis OR code as 'uncertain' and analyze separately"
    examples:
      - "Brief mention with little context"
      - "Text could describe protest or other gathering"
      - "Event in country outside target scope"

  unknown_confidence:
    meaning: "Model could not determine confidence — AVOID USING THIS"
    action: "Treat as low confidence in analysis; prompt should never return 'unknown'"

  civic_space_downgrade:
    meaning: "Events from CIVICUS-rated 'repressed' or 'closed' countries are systematically under-reported"
    action: |
      Apply automatic downgrade regardless of field completeness:
      - Country rated 'repressed' (Cameroon, DRC, Ethiopia, Tanzania) → cap at 'medium'
      - Country rated 'closed' (Eritrea, Sudan) → cap at 'low'
      This reflects known reporting gaps in independent media under civic space restriction,
      not a judgment about the event itself.

  protest_adjacent_downgrade:
    trigger: |
      The article is primarily about a government announcement, court ruling,
      parliamentary debate, police statement, or NGO report ABOUT a protest
      event, rather than a contemporaneous news report OF the protest.
    effect: "Downgrade confidence one level (high → medium; medium → low)"
    examples:
      trigger_yes:
        - "Government bans protest march planned for Saturday (article published Friday)"
        - "Police report 47 arrests from last week's demonstration"
        - "Human rights commission publishes findings on 2023 crackdown"
        - "Opposition leader condemns teargas use at yesterday's rally"
      trigger_no:
        - "Protesters marched through Kampala on Tuesday demanding [...]"
        - "Hundreds arrested as police dispersed crowds outside parliament"
        - "Strike continues for third day; union rejects government offer"
    note: |
      Apply to the event being described, not to the article as a whole. If an
      article contains both a contemporaneous report of Event A and a government
      statement about Event B, downgrade only Event B.

# ============================================================================
# QUALITY CONTROL CHECKLIST
# ============================================================================

qc_checklist:
  mandatory:
    - "Does the article explicitly report a REAL, PAST protest event (not a plan, proposal, or commentary)?"
    - "Are ≥2 participants mentioned or clearly implied (exception: hunger_strike)?"
    - "Is there explicit political motivation, demand, or grievance?"
    - "Does the event take place in public space or target a public audience?"
    - "Is this action OUTSIDE normal institutional channels (not a conference, vote, or court proceeding)?"
    - "Is the event NOT in the non_events list above?"
  quality:
    - "Can I identify the country AND at least approximate date?"
    - "Does the event type match one of the eight valid keys?"
    - "Would a protest event scholar agree this qualifies?"
    - "Is confidence set to high/medium/low (not unknown)?"
    - "Have I correctly derived turmoil_level from the extracted fields?"

# ============================================================================
# CODING RULES SUMMARY
# ============================================================================

general_rules:
  1_primary_type: "Assign ONE primary event type per event (from the eight valid keys)"
  2_confidence: "Provide confidence score: high / medium / low — never 'unknown'"
  3_text_only: "Use only information in provided text; do not infer or hallucinate"
  4_political: "All classifications require explicit or very clear political motivation"
  5_peace_bias: "When uncertain between peaceful and violent, bias toward peaceful classification"
  6_organization: "Protests require ≥2 people (exception: hunger_strike can be 1); note organized vs. spontaneous"
  7_location_temporal: "All events must have identifiable country and approximate date"
  8_ambiguous_types: "If genuinely ambiguous between 2 types, choose more restrictive one"
  9_non_event_gate: "Apply minimum_criteria check FIRST — if any disqualifier applies, return []"
  10_turmoil_level: "Always derive turmoil_level from extracted fields using the defined derivation logic"
  11_african_scope: "Flag events outside African target countries with low confidence"
