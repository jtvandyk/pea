  - id: "ex_08"
    pinned: true
    description: "Vigil with accountability demand — Cape Town, police violence victim"
    rationale: |
      Demonstrates VIGIL, currently uncovered. The disambiguating rule against
      DEMONSTRATION_MARCH: a candlelit gathering with an explicit
      justice/accountability demand and a non-march form (standing, holding
      images, silent) is a VIGIL. A march that ends with a moment of silence
      remains a DEMONSTRATION_MARCH. Vigils typically have no movement
      component, lower crowd size, and explicit reference to a victim or
      named harm. Without this example, the LLM tends to upgrade vigils to
      demonstration_march on the gathering signal alone.
    article_snippet: |
      About 250 people gathered outside the Cape Town Magistrates' Court on
      Friday evening for a candlelit vigil for Sipho Madikizela, a 24-year-old
      who died in police custody last week. Carrying photographs of the
      deceased and holding lit candles, mourners stood in silence for an hour
      before community leaders read a statement demanding the prosecution of
      the officers involved and an independent inquiry by the Independent
      Police Investigative Directorate. There was no march. No incidents were
      reported, and the gathering dispersed shortly after 8pm. The Madikizela
      family said they would return weekly until charges were laid.
    extracted_events:
      - event_date: null
        country: "South Africa"
        city: "Cape Town"
        region: "Western Cape"
        venue: "Cape Town Magistrates' Court"
        location_notes: "Candlelit gathering outside courthouse; no march component"
        event_type: "vigil"
        organizer: null
        participant_groups: ["mourners", "community members", "Madikizela family"]
        claims: ["prosecution of officers involved in custody death", "independent IPID inquiry"]
        crowd_size: "250"
        duration: "1 hour"
        state_response: "none"
        state_actors: []
        arrests: "0"
