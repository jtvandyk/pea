# Country reference data for the PEA pipeline.
#
# Consolidates ISO2, ISO3, FIPS, display names, and target geography flags
# that were previously scattered across processing.py, gdelt_discovery.py,
# bbc_discovery.py, and web/app.py.
#
# Fields:
#   iso2   — ISO 3166-1 alpha-2 code (pipeline standard key)
#   name   — display name (title case)
#   iso3   — ISO 3166-1 alpha-3 code (BBC Monitoring uses this)
#   fips   — FIPS 10-4 code (GDELT sourcecountry filter; NOT the same as ISO2)
#   target — true if in the default Africa processing target set
#   aliases — alternative lowercase name strings accepted by the country filter

countries:

  # ---------------------------------------------------------------------------
  # Africa — primary target geography
  # ---------------------------------------------------------------------------

  - iso2: NG
    name: Nigeria
    iso3: NGA
    fips: NI
    target: true

  - iso2: ZA
    name: South Africa
    iso3: ZAF
    fips: SF
    target: true

