  - id: "ve_ex_04"
    pinned: true
    description: "Ambiguous kidnapping — doubt_terrorism: other_crime, Gulf of Guinea piracy"
    rationale: |
      Demonstrates correct use of doubt_terrorism: true with reason other_crime.
      This kidnapping meets the mandatory GTD criteria (intentional, violent, sub-national
      actor) but fails the 2-of-3 test: no political goal is stated, no coercive message
      to a broader audience, and the method is consistent with purely criminal piracy.
      The event is still extracted (not discarded) but flagged as doubtful. This is the
      correct approach when the article is genuinely ambiguous.
    article_snippet: |
      Armed men boarded a Liberian-flagged chemical tanker in international waters
      off the Niger Delta early Saturday and kidnapped seven crew members —
      five Filipinos and two Greeks — before departing with the hostages. The
      ship's owner, Athens-based Crestview Shipping, confirmed the incident and
      said ransom negotiations were underway through a private security firm.
      No group has claimed responsibility. The Nigerian Navy said it was
      investigating but described the attack as "a criminal act by sea robbers."
      Piracy incidents in the Gulf of Guinea have increased in recent months.
    extracted_events:
      - event_date: null
        country: "Nigeria"
        city: null
        region: "Gulf of Guinea (international waters off Niger Delta)"
        venue: "Liberian-flagged chemical tanker"
        location_notes: "International waters; Nigerian Navy jurisdiction invoked"
        attack_type: "kidnapping"
        perpetrator_name: null
        perpetrator_ideology: "criminal"
        is_individual_attacker: false
        target_type: "maritime"
        target_description: "Seven crew members (5 Filipino, 2 Greek) aboard chemical tanker"
        weapon_type: "firearms"
        weapon_subtype: null
        fatalities: null
        injuries: null
        hostages_taken: "7"
        property_damage: false
        responsibility_claimed: false
        doubt_terrorism: true
        doubt_reason: "other_crime"
        outcome: "ongoing"
        outcome_notes: "Ransom negotiations underway via private security firm; Nigerian Navy calls it criminal act"
        article_title: null
        article_url: null
        article_date: null
        source_country: null
        source_language: "en"
        confidence: "medium"
