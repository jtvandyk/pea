# =============================================================================
# DRONE EVENT CODEBOOK — FEW-SHOT EXTRACTION EXAMPLES (v1.0)
# =============================================================================
# Companion to drone_events_codebook.yaml.
# Injected into every user prompt by _build_few_shot_examples() in extractor.py.
#
# FORMAT REQUIREMENT: top-level key must be 'examples:' (list).
# Each entry: id, description, rationale, article_snippet, extracted_events (list).
#
# Selected 6 of 25 available examples to cover:
#   ex_01 — drone_strike_attack (state UCAV, counterterrorism, high confidence)
#   ex_02 — drone_surveillance_isr + loitering_munition_attack (paired, parent_event_id)
#   ex_03 — drone_interception_shootdown (counter-drone, multi-platform)
#   ex_04 — drone_surveillance_isr (civic surveillance, CIVICUS repressed, medium confidence)
#   ex_05 — drone_supply_logistics (criminal context, border smuggling)
#   ex_06 — drone_strike_attack (civilian harm, contested attribution, Africa, IDP camp)
# =============================================================================

examples:

  # ---------------------------------------------------------------------------
  - id: "ex_01"
    description: "drone_strike_attack — US MQ-9 counterterrorism strike, Afghanistan, high confidence"
    rationale: |
      Baseline kinetic example: reusable UCAV delivers munitions and returns to base →
      drone_strike_attack (not loitering_munition_attack). Platform named explicitly in
      official statement → tier_4_single_source_claimed (only one official cited, no
      corroborating source identifies the specific model). No civilian casualties →
      civilian_harm_grade = 'none' (not 'unverified'). Date absent from article →
      date field null. State counterterrorism in active IHL conflict = ihl_armed_conflict.
    article_snippet: |
      A U.S. drone strike in northeastern Afghanistan on Tuesday killed three suspected
      al-Qaeda operatives, including a senior planner, a U.S. defense official said.
      The MQ-9 Reaper fired two Hellfire missiles at a compound in Kunar province.
      There were no reports of civilian casualties.
    extracted_events:
      - event_type: "drone_strike_attack"
        primary_purpose: "kinetic_attack_personnel"
        secondary_purposes: []
        attributed_actor: "United States military"
        actor_category: "state_military"
        actor_maturity_level: "strategic"
        named_unit: null
        platform_class: "ucav_male"
        platform_model: "MQ-9 Reaper"
        platform_identification_confidence: "tier_4_single_source_claimed"
        autonomy_level: "level_2"
        target_category: "named_individual"
        target_status: "legitimate_military"
        target_location:
          country: "Afghanistan"
          admin_region: "Kunar province"
          specific: null
        weapon_delivered: "2x AGM-114 Hellfire missiles"
        casualties:
          killed_combatants_min: 3
          killed_combatants_max: 3
          killed_civilians_min: 0
          killed_civilians_max: 0
        civilian_harm_grade: "none"
        civilian_harm_cause: null
        state_response: "none"
        outcome: "target_destroyed_confirmed"
        event_legal_context: "ihl_armed_conflict"
        event_confidence: "high"
        attribution_confidence: "confirmed"
        civic_space_rating: null
        parent_event_id: null
        child_event_ids: []
        date: null

  # ---------------------------------------------------------------------------
  - id: "ex_02"
    description: "Paired ISR+Strike — Russian Orlan-10 (parent) → Lancet-3 loitering munition (child)"
    rationale: |
      One article = TWO events linked via parent_event_id. The Orlan-10 ISR overflight
      is the PARENT (occurred first, enabled the strike). The Lancet-3 is the CHILD
      (references the Orlan via parent_event_id). Lancet-3 = loitering_munition_attack
      (not drone_strike_attack) because the platform is expendable — it strikes the
      target and is destroyed on impact. The Orlan's secondary_purpose includes
      isr_battle_damage_assessment because it returned post-strike to confirm.
      Both events must be coded; coding only the strike loses the ISR context.
    article_snippet: |
      A Russian Orlan-10 reconnaissance drone circled over a Ukrainian artillery position
      near Bakhmut for approximately 40 minutes, spotting a camouflaged M777 howitzer.
      Ten minutes after the Orlan departed, a Lancet-3 loitering munition struck and
      destroyed the howitzer. The Orlan returned 15 minutes later to confirm the strike
      via video feed back to the operator.
    extracted_events:
      - event_id: "EX02_A"
        event_type: "drone_surveillance_isr"
        primary_purpose: "isr_pre_attack"
        secondary_purposes: ["isr_battle_damage_assessment"]
        attributed_actor: "Russian Federation military"
        actor_category: "state_military"
        actor_maturity_level: "strategic"
        named_unit: null
        platform_class: "fixed_wing_small"
        platform_model: "Orlan-10"
        platform_identification_confidence: "tier_3_multi_source_attributed"
        autonomy_level: null
        surveillance_target_category: "hard_military_equipment"
        target_status: "legitimate_military"
        location:
          country: "Ukraine (contested territory)"
          admin_region: "Donetsk region"
          specific: "near Bakhmut"
        duration: "40 minutes initial + 15 minutes post-strike BDA"
        state_response: null
        outcome: "ongoing_operation"
        event_legal_context: "ihl_armed_conflict"
        event_confidence: "high"
        attribution_confidence: "two_source_attributed"
        civic_space_rating: null
        parent_event_id: null
        child_event_ids: ["EX02_B"]
        date: null

      - event_id: "EX02_B"
        event_type: "loitering_munition_attack"
        primary_purpose: "kinetic_attack_military"
        secondary_purposes: []
        attributed_actor: "Russian Federation military"
        actor_category: "state_military"
        actor_maturity_level: "strategic"
        named_unit: null
        platform_class: "loitering_munition_tactical"
        platform_model: "Lancet-3"
        platform_identification_confidence: "tier_3_multi_source_attributed"
        autonomy_level: "level_2"
        target_category: "hard_military_equipment"
        target_status: "legitimate_military"
        target_location:
          country: "Ukraine (contested territory)"
          admin_region: "Donetsk region"
          specific: "near Bakhmut — M777 howitzer position"
        casualties:
          killed_combatants_min: 0
          killed_combatants_max: 0
          killed_civilians_min: 0
          killed_civilians_max: 0
        civilian_harm_grade: "none"
        civilian_harm_cause: null
        state_response: "none"
        outcome: "target_destroyed_confirmed"
        event_legal_context: "ihl_armed_conflict"
        event_confidence: "high"
        attribution_confidence: "two_source_attributed"
        civic_space_rating: null
        parent_event_id: "EX02_A"
        child_event_ids: []
        date: null

  # ---------------------------------------------------------------------------
  - id: "ex_03"
    description: "drone_interception_shootdown — Ukrainian air defence, 43 mixed drones, kinetic intercept"
    rationale: |
      43 drones intercepted in one operational window at one intercepting actor =
      ONE interception event (not 43 events). Multiple intercepted_platform_class
      values because both Shahed (strategic OWA) and Lancet (tactical loitering) were
      engaged. interceptor_method = kinetic_intercept_ground (primary method used by
      most intercepts in the article). This event does NOT automatically generate 43
      corresponding attack events — the launch events would be coded separately if
      the article reported specific targets. High confidence: official military statement
      with named platforms and specific counts.
    article_snippet: |
      Ukrainian air defences shot down 35 Shahed-136 drones and 8 Lancet drones overnight
      during Russia's largest drone attack of the month, the air force command said.
      Two of the Shaheds were intercepted by mobile gun teams in the Kyiv region. The rest
      were destroyed by Gepard anti-aircraft systems and Stinger missiles.
    extracted_events:
      - event_type: "drone_interception_shootdown"
        primary_purpose: "counter_drone"
        secondary_purposes: []
        intercepting_actor: "Ukrainian military (Air Force Command)"
        intercepting_actor_category: "state_military"
        intercepted_drone_actor: "Russian Federation military"
        intercepted_drone_actor_category: "state_military"
        intercepted_platform_class: ["loitering_munition_strategic", "loitering_munition_tactical"]
        intercepted_platform_models: ["Shahed-136", "Lancet"]
        intercepted_drone_count: 43
        interceptor_method: "kinetic_intercept_ground"
        interceptor_systems: ["Gepard", "Stinger", "mobile gun teams"]
        location:
          country: "Ukraine"
          admin_region: "multiple regions including Kyiv"
          specific: null
        state_response: null
        outcome: "drone_intercepted"
        event_legal_context: "ihl_armed_conflict"
        event_confidence: "high"
        attribution_confidence: "confirmed"
        civic_space_rating: null
        parent_event_id: null
        child_event_ids: []
        date: null

  # ---------------------------------------------------------------------------
  - id: "ex_04"
    description: "drone_surveillance_isr — Ethiopian civilian surveillance of refugee camp, CIVICUS repressed, medium confidence"
    rationale: |
      Surveillance of a refugee camp → primary_purpose = isr_civic_surveillance (not
      isr_pre_attack, because no kinetic action followed). Platform unspecified →
      platform_class = unknown_platform, platform_identification_confidence = tier_5_unknown.
      Ethiopia is CIVICUS-rated 'repressed' → civic_space_rating = 'repressed' → automatic
      confidence cap at 'medium' (per civic_space_downgrade rule in confidence_guidance).
      event_confidence = medium not high: single informal source (humanitarian workers),
      Ethiopian government silent, no independent corroboration. No kinetic action so
      state_response = diplomatic_protest (humanitarian workers reported to authorities).
    article_snippet: |
      An Ethiopian reconnaissance drone has been spotted circling over the Mai Aini refugee
      camp in Tigray region for the past three days, according to humanitarian workers. The
      camp hosts approximately 25,000 Eritrean refugees. No kinetic action has been reported.
      The Ethiopian government has not commented.
    extracted_events:
      - event_type: "drone_surveillance_isr"
        primary_purpose: "isr_civic_surveillance"
        secondary_purposes: []
        attributed_actor: "Ethiopian military"
        actor_category: "state_military"
        actor_maturity_level: "tactical"
        named_unit: null
        platform_class: "unknown_platform"
        platform_model: null
        platform_identification_confidence: "tier_5_unknown"
        autonomy_level: null
        surveillance_target_category: "civilian_population"
        target_status: "protected_civilian"
        location:
          country: "Ethiopia"
          admin_region: "Tigray region"
          specific: "Mai Aini refugee camp"
        duration: "3 days observed"
        state_response: "diplomatic_protest"
        outcome: "ongoing_operation"
        event_legal_context: "ihl_disputed"
        event_confidence: "medium"
        attribution_confidence: "single_source_claimed"
        civic_space_rating: "repressed"
        parent_event_id: null
        child_event_ids: []
        date: null

  # ---------------------------------------------------------------------------
  - id: "ex_05"
    description: "drone_supply_logistics — India-Pakistan border smuggling, criminal context, unattributed actor"
    rationale: |
      Coded as drone_supply_logistics (not drone_strike_attack) because cargo is contraband
      (narcotics + firearms), not munitions for an attack. actor_category = criminal_organization
      even though the specific network is unnamed. event_legal_context = domestic_criminal
      (not ihl or non_state_potential_terrorism — smuggling across a contested border is
      criminal, not political violence). The interception by BSF = state_response =
      kinetic_intercept_ground. Included in the drone dataset because non-state drone
      logistics informs capability trajectory (Haugstvedt 2023). actor_maturity_level = null
      because the actor is an unnamed criminal network, not a documented VEO program.
    article_snippet: |
      Indian Border Security Force shot down a drone carrying 4.5 kg of heroin and two
      9mm pistols along the India-Pakistan border in Amritsar sector, officials said. The
      drone, believed to be a modified commercial quadcopter, was the fifth such interception
      this month.
    extracted_events:
      - event_type: "drone_supply_logistics"
        primary_purpose: "logistics_smuggling"
        secondary_purposes: []
        attributed_actor: "unknown (Pakistan-origin smuggling network)"
        actor_category: "criminal_organization"
        actor_maturity_level: null
        named_unit: null
        platform_class: "commercial_multirotor"
        platform_model: null
        platform_identification_confidence: "tier_5_unknown"
        autonomy_level: null
        cargo_category: "contraband"
        cargo_details:
          narcotics_kg: 4.5
          firearms_count: 2
        destination_location:
          country: "India"
          admin_region: "Punjab"
          specific: "Amritsar sector border"
        state_response: "kinetic_intercept_ground"
        outcome: "drone_intercepted"
        event_legal_context: "domestic_criminal"
        event_confidence: "high"
        attribution_confidence: "unattributed"
        civic_space_rating: null
        parent_event_id: null
        child_event_ids: []
        date: null

  # ---------------------------------------------------------------------------
  - id: "ex_06"
    description: "drone_strike_attack — Ethiopian TB2 kills 56+ civilians at IDP camp, contested attribution, Africa, CIVICUS repressed"
    rationale: |
      Africa-specific example: civilian harm, contested attribution, CIVICUS repressed country.
      platform_identification_confidence = tier_1_sensor_confirmed (satellite imagery + fragment
      analysis, strongest possible evidence level). civilian_harm_grade = fair_contested: UN and
      independent sources corroborate civilian deaths (= 'fair') but Ethiopia contests the
      attribution (= 'contested'). attribution_confidence = contested: government denial with
      corroborating independent evidence. Ethiopia = CIVICUS 'repressed' → civic_space_rating
      recorded. event_legal_context = ihl_disputed: strike on a protected civilian site is
      presumptively unlawful but Ethiopia claims military necessity. Confidence HIGH despite
      repressed context because sensor-confirmed evidence overrides single-source limitation.
    article_snippet: |
      An Ethiopian National Defense Force airstrike killed at least 56 civilians at a camp for
      internally displaced persons in Dedebit, Tigray region, the United Nations said. The
      Ethiopian government denied targeting civilians. Satellite imagery analysts identified the
      strike as having been conducted by a Turkish-made Bayraktar TB2 drone based on fragment
      markings. Casualty counts from on-the-ground humanitarian monitors ranged from 56 to 59.
    extracted_events:
      - event_type: "drone_strike_attack"
        primary_purpose: "kinetic_attack_civilian"
        secondary_purposes: []
        attributed_actor: "Ethiopian National Defense Force (ENDF)"
        actor_category: "state_military"
        actor_maturity_level: "tactical"
        named_unit: null
        platform_class: "ucav_male"
        platform_model: "Bayraktar TB2"
        platform_identification_confidence: "tier_1_sensor_confirmed"
        autonomy_level: "level_2"
        target_category: "civilian_population"
        target_status: "protected_civilian"
        target_location:
          country: "Ethiopia"
          admin_region: "Tigray region"
          specific: "Dedebit IDP camp"
        casualties:
          killed_combatants_min: 0
          killed_combatants_max: 0
          killed_civilians_min: 56
          killed_civilians_max: 59
        civilian_harm_grade: "fair_contested"
        civilian_harm_cause: "direct_strike"
        state_response: "none"
        outcome: "target_destroyed_confirmed"
        event_legal_context: "ihl_disputed"
        event_confidence: "high"
        attribution_confidence: "contested"
        civic_space_rating: "repressed"
        parent_event_id: null
        child_event_ids: []
        date: null
