name: Docker Build & Push (ACR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Verify job: lint + unit tests must pass before any image is built or
  #    pushed. lint.yml and tests.yml run independently for fast PR feedback;
  #    duplicating them here is the gate that blocks bad images from reaching
  #    ACR or :latest. Cross-workflow dependencies aren't expressible in
  #    plain `needs:`, so the cheapest safe option is to repeat the checks.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint + test deps
        run: |
          pip install black==25.11.0 flake8 pytest
          pip install numpy pyyaml pandas python-dotenv
      - name: black
        run: black --check src/ tests/
      - name: flake8
        run: flake8 src/ tests/
      - name: pytest
        run: pytest tests/ -q

  # ── Build-only job: runs on every PR to catch Docker failures before merge ──
  docker-build-test:
    if: github.event_name == 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build pipeline image (no push)
        run: docker build -f Dockerfile -t pea-pipeline:test .

      - name: Build dashboard image (no push)
        run: docker build -f Dockerfile.web -t pea-dashboard:test .

  # ── Build, tag, and push to ACR: runs only on push to main ─────────────────
  build-and-push:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push pipeline image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/pea-pipeline
          docker build -f Dockerfile -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:latest

      - name: Build and push dashboard image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/pea-dashboard
          docker build -f Dockerfile.web -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:latest

      - name: Image digest
        run: |
          echo "Pipeline: ${{ secrets.ACR_LOGIN_SERVER }}/pea-pipeline:${{ github.sha }}"
          echo "Dashboard: ${{ secrets.ACR_LOGIN_SERVER }}/pea-dashboard:${{ github.sha }}"

  # ── Update Container Apps Jobs: separate job so build failures are distinct ─
  update-container-apps:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install containerapp extension
        run: az extension add --name containerapp --yes

      - name: Update Container Apps Jobs to new image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/pea-pipeline:${{ github.sha }}
          az containerapp job update \
            --name pea-daily \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image $IMAGE
          az containerapp job update \
            --name pea-backfill \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image $IMAGE
